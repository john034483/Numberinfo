<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PRINCE OS :: PROCESSING</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Modern & Clean Fonts -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-color: #030712;
  --panel-bg: rgba(17, 24, 39, 0.85);
  --accent-cyan: #00f2fe;
  --accent-purple: #4facfe;
  --text-primary: #f3f4f6;
  --text-muted: #4b5563;
  --border-color: rgba(0, 242, 254, 0.25);
  --glow: 0 0 15px rgba(0, 242, 254, 0.4);
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  overflow: hidden;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
  );
}

body::after {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 25%, rgba(3, 7, 18, 0.9) 100%);
  pointer-events: none; z-index: 0;
}

#mc {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; opacity: 0.08; pointer-events: none;
}

/* ── PANEL ── */
.panel {
  position: relative; z-index: 10;
  width: 92%; max-width: 460px;
  border: 1px solid var(--border-color);
  background: var(--panel-bg);
  border-radius: 16px;
  backdrop-filter: blur(8px);
  box-shadow: inset 0 0 30px rgba(0, 242, 254, 0.05), 0 10px 30px rgba(0,0,0,0.5);
  animation: boxIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}

@keyframes boxIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Custom Sleek Corners */
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 24px; height: 24px;
  border-top: 3px solid var(--accent-cyan); border-left: 3px solid var(--accent-cyan);
  border-top-left-radius: 16px;
  box-shadow: var(--glow);
}
.panel::after {
  content: '';
  position: absolute; bottom: 0; right: 0;
  width: 24px; height: 24px;
  border-bottom: 3px solid var(--accent-cyan); border-right: 3px solid var(--accent-cyan);
  border-bottom-right-radius: 16px;
  box-shadow: var(--glow);
}

.scan-beam {
  position: absolute; top: 0; left: -100%; width: 50%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  animation: beam 2.5s linear infinite; z-index: 1;
}
@keyframes beam { 0% { left: -100% } 100% { left: 200% } }

/* Header */
.phead {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-color);
  background: rgba(0, 242, 254, 0.03);
  display: flex; align-items: center; justify-content: space-between;
}
.phead-title {
  font-family: 'Syncopate', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 4px; color: var(--accent-cyan);
  text-shadow: var(--glow);
}
.pdots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent-cyan);
  margin-left: 6px; opacity: 0.3;
}
.pdots span:first-child { opacity: 0.9; animation: blink 1s infinite; }
.pdots span:nth-child(2) { animation: blink 1s 0.33s infinite; }
.pdots span:nth-child(3) { animation: blink 1s 0.66s infinite; }
@keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.2 } }

/* Body */
.pbody { padding: 36px 30px; text-align: center; }

.sys-tag {
  font-size: 10px; letter-spacing: 5px;
  color: var(--accent-purple); margin-bottom: 16px;
  font-weight: 700;
}

h1 {
  font-family: 'Syncopate', sans-serif;
  font-size: clamp(16px, 4.5vw, 26px);
  font-weight: 700; letter-spacing: 6px;
  color: #ffffff;
  text-shadow: 0 0 20px rgba(255,255,255,0.2);
  margin-bottom: 30px;
  animation: glitch 4s infinite;
}
@keyframes glitch {
  0%,85%,100% { text-shadow: 0 0 20px rgba(255,255,255,0.2); transform: none; }
  86% { text-shadow: -2px 0 #ff0080, 2px 0 #00d4ff; transform: translate(-1px); }
  87% { text-shadow: 2px 0 #ff0080, -2px 0 #00d4ff; transform: translate(1px); }
  88% { text-shadow: 0 0 20px rgba(255,255,255,0.2); transform: none; }
}

/* Spinner */
.spinner-wrap { margin-bottom: 30px; position: relative; display: inline-block; }

.ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

.ring::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 50%;
  border: 2px solid rgba(0, 242, 254, 0.05);
  border-top-color: var(--accent-cyan);
  box-shadow: var(--glow);
  animation: spin 0.8s linear infinite;
}

.ring::after {
  content: '';
  position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border-radius: 50%;
  border: 1px solid rgba(79, 172, 254, 0.05);
  border-bottom-color: var(--accent-purple);
  box-shadow: 0 0 12px rgba(79, 172, 254, 0.3);
  animation: spin 1.2s linear infinite reverse;
}

.ring-icon {
  font-size: 24px; z-index: 1;
  animation: iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: var(--glow); } }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Status Text */
.status-txt {
  font-size: 11px; letter-spacing: 2px;
  color: var(--accent-cyan); text-shadow: var(--glow);
  margin-bottom: 24px;
  min-height: 20px;
  text-transform: uppercase;
  font-weight: 500;
}

/* Progress */
.prog-lbl {
  font-size: 10px; letter-spacing: 2px;
  color: var(--text-muted); margin-bottom: 10px;
  display: flex; justify-content: space-between;
}

.prog-bar {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  margin-bottom: 12px; position: relative; overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
  width: 0%; transition: width 0.2s ease-out;
  position: relative;
  border-radius: 10px;
}

.prog-pct {
  font-family: 'Syncopate', sans-serif;
  font-size: 20px; font-weight: 700;
  color: #ffffff;
  margin-top: 12px;
}

/* Log Lines */
.log-area {
  margin-top: 24px; text-align: left;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 16px;
  max-height: 110px; overflow: hidden;
  font-size: 12px; line-height: 2;
  color: var(--text-muted);
}

.log-line { animation: fadeIn 0.3s ease-out both; }
.log-line.active { color: var(--accent-cyan); }
.log-line.done   { color: var(--text-muted); }

@keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

.footer {
  position: fixed; bottom: 16px;
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 3px; z-index: 10;
  text-transform: uppercase;
}
.footer span {
  color: var(--accent-cyan);
  font-weight: bold;
}
</style>
</head>
<body>

<canvas id="mc"></canvas>

<div class="panel">
  <div class="scan-beam"></div>

  <div class="phead">
    <div class="phead-title">PRINCE OS // CONNECTING</div>
    <div class="pdots"><span></span><span></span><span></span></div>
  </div>

  <div class="pbody">
    <div class="sys-tag">PRINCE-OS ENGINE v5.0 // CORE_ACTIVE</div>
    <h1>PRINCE CHAURASIA</h1>

    <div class="spinner-wrap">
      <div class="ring">
        <span class="ring-icon">💎</span>
      </div>
    </div>

    <div class="status-txt" id="statusTxt">BOOTING ENVIRONMENT...</div>

    <div class="prog-lbl">
      <span>SECURE LINK PROGRESS</span>
      <span id="pctLbl">0%</span>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="progFill"></div>
    </div>
    <div class="prog-pct" id="pctBig">0%</div>

    <div class="log-area" id="logArea"></div>
  </div>
</div>

<div class="footer">ENVIRONMENT ARCHITECT: <span>PRINCE CHAURASIA</span></div>

<script>
/* matrix core effect */
var mc=document.getElementById('mc'),ctx=mc.getContext('2d');
function rsz(){mc.width=window.innerWidth;mc.height=window.innerHeight;}
rsz(); window.addEventListener('resize',rsz);
var ch='01X7PRINCECHAURASIA99',dp=[];
function iDp(){dp=Array(Math.floor(mc.width/16)).fill(1);}
iDp(); window.addEventListener('resize',iDp);
setInterval(function(){
  ctx.fillStyle='rgba(3,7,18,0.06)';ctx.fillRect(0,0,mc.width,mc.height);
  ctx.font='12px monospace';
  for(var i=0;i<dp.length;i++){
    ctx.fillStyle=Math.random()>0.92?'#4facfe':'#00f2fe';
    ctx.globalAlpha=Math.random()*0.4+0.2;
    ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*16,dp[i]*16);
    if(dp[i]*16>mc.height&&Math.random()>0.98)dp[i]=0;
    dp[i]++;
  }
  ctx.globalAlpha=1;
},45);

/* beep synth */
var aC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d){
  try{
    var o=aC.createOscillator(),g=aC.createGain();
    o.frequency.value=f; g.gain.value=0.03;
    o.connect(g); g.connect(aC.destination);
    o.start(); o.stop(aC.currentTime+d);
  }catch(e){}
}

/* logging handler */
var logArea=document.getElementById('logArea');
function addLog(txt, active){
  var d=document.createElement('div');
  d.className='log-line '+(active?'active':'done');
  d.textContent='> '+txt;
  logArea.appendChild(d);
  logArea.scrollTop=logArea.scrollHeight;

  var lines=logArea.querySelectorAll('.log-line.active');
  for(var i=0;i<lines.length-1;i++) lines[i].className='log-line done';
}

/* params configuration */
var params=new URLSearchParams(window.location.search);
var num=params.get('num');

var pct=0;
var stages=[
  {pct:12,  status:'PRINCE-OS CORE LOADING...', log:'Core architecture boot successful'},
  {pct:28,  status:'ANALYZING REQUEST NODE...',  log:'Target data hook: '+num},
  {pct:45,  status:'BUILDING SAFE TUNNEL...',   log:'Secured proxy node cluster active'},
  {pct:60,  status:'FETCHING MATRIX RECORDS...', log:'Query routed to target mainframe'},
  {pct:75,  status:'DECRYPTING CIPHER PACKS...', log:'AES key matrix matches perfectly'},
  {pct:88,  status:'PARSING EXTRACT DATA...',    log:'Structuring fields inside Prince OS'},
  {pct:96,  status:'RESOLVING GEOLOCATION...',   log:'Syncing live location lat/long nodes'},
  {pct:100, status:'DECRYPTION SUCCESSFUL ✔',     log:'All assets verified by Prince Chaurasia'},
];

var si=0;
var fill=document.getElementById('progFill');
var pctLbl=document.getElementById('pctLbl');
var pctBig=document.getElementById('pctBig');
var statusTxt=document.getElementById('statusTxt');

function runStage(){
  if(si>=stages.length){
    setTimeout(function(){
      window.location.href='result.html?num='+encodeURIComponent(num);
    }, 800);
    return;
  }

  var s=stages[si];
  si++;

  var from=pct;
  var to=s.pct;
  var step=(to-from)/20;
  var cur=from;
  var tid=setInterval(function(){
    cur+=step;
    if(cur>=to){ cur=to; clearInterval(tid); }
    fill.style.width=cur+'%';
    pctLbl.textContent=Math.floor(cur)+'%';
    pctBig.textContent=Math.floor(cur)+'%';
    beep(400+cur*2, 0.03);
  },20);
  pct=to;

  statusTxt.textContent=s.status;
  addLog(s.log, true);

  var delay = si===stages.length ? 1500 : 500+Math.random()*400;
  setTimeout(runStage, delay);
}

// initialization
setTimeout(function(){
  addLog('PRINCE CHAURASIA INTERFACE ONLINE', true);
  setTimeout(runStage, 500);
}, 300);
</script>
</body>
</html>
